version: '3.8'

# 北京K12英语AI家教 — 阿里云生产环境 Docker Compose
# 使用: docker-compose -f docker-compose.prod.yml up -d

services:
  tutor:
    build:
      context: ../..
      dockerfile: deploy/aliyun/Dockerfile
    container_name: beijing-tutor
    ports:
      - "127.0.0.1:3000:3000"   # 仅本地访问，通过Nginx反向代理
    env_file:
      - ../../.env
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - tutor-data:/app/data
      - ../../references:/app/references:ro
      - ../../CLAUDE.md:/app/CLAUDE.md:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tutor-data:
    driver: local
