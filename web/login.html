<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Melix Teacher — Login</title>
<style>
:root{--pri:#7A6CF5;--pri-light:#F0ECFD;--pri-dark:#5A4BD4;--bg:#F8F8FA;--surface:#FFFFFF;--text:#1F2430;--text2:#8B8FA0;--border:#EAEBF0;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.login-card{background:var(--surface);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 2px 20px rgba(0,0,0,.06);border:1px solid var(--border)}
.login-logo{text-align:center;margin-bottom:8px;font-size:2.5rem}
.login-title{text-align:center;font-size:1.2rem;font-weight:700;margin-bottom:4px;color:var(--text)}
.login-sub{text-align:center;font-size:.82rem;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:.8rem;font-weight:600;margin-bottom:6px;display:block;color:var(--text)}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.95rem;font-family:inherit;background:var(--bg);transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-light)}
.code-row{display:flex;gap:10px}
.code-row .form-input{flex:1}
.btn-code{white-space:nowrap;padding:12px 16px;border:1.5px solid var(--pri);border-radius:var(--radius);background:var(--surface);color:var(--pri);font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.btn-code:hover{background:var(--pri-light)}
.btn-code:disabled{opacity:.5;cursor:not-allowed}
.btn-login{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--pri);color:#fff;font-size:1rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;margin-top:4px}
.btn-login:hover{filter:brightness(1.08)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-footer{text-align:center;margin-top:20px;font-size:.72rem;color:var(--text2)}
.login-footer a{color:var(--pri);text-decoration:none}
.error-msg{background:#FFF0F0;color:#C44;padding:10px 14px;border-radius:var(--radius);font-size:.82rem;margin-bottom:16px;display:none}
.success-msg{background:#EDF5EE;color:var(--success);padding:10px 14px;border-radius:var(--radius);font-size:.82rem;margin-bottom:16px;display:none}
.agree-row{display:flex;align-items:center;gap:6px;margin:12px 0;font-size:.75rem;color:var(--text2)}
.agree-row input{accent-color:var(--pri)}
.agree-row a{color:var(--pri)}
@media(max-width:480px){.login-card{padding:32px 20px;border-radius:0;max-width:100%;min-height:100vh}}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <img src="/logo.png" width="72" height="72" alt="Melix" style="border-radius:12px">
  </div>
  <div class="login-title">Melix Teacher</div>
  <div class="login-sub">AI Teaching Workspace</div>

  <div class="error-msg" id="errMsg"></div>
  <div class="success-msg" id="okMsg"></div>

  <div class="form-group">
    <label class="form-label">手机号</label>
    <input class="form-input" id="phone" type="tel" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
  </div>

  <div class="form-group">
    <label class="form-label">验证码</label>
    <div class="code-row">
      <input class="form-input" id="code" type="text" placeholder="6位验证码" maxlength="6" autocomplete="one-time-code">
      <button class="btn-code" id="btnSend" onclick="sendCode()">发送验证码</button>
    </div>
  </div>

  <div class="agree-row">
    <input type="checkbox" id="agree" checked>
    <span>我已阅读 <a href="#" onclick="return false">《用户协议》</a> 和 <a href="#" onclick="return false">《隐私政策》</a></span>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">登录 / 注册</button>

  <div class="login-footer">
    首次登录自动创建账号
    <br><span style="font-size:.65rem;opacity:.6">开发模式：验证码固定为 123456</span>
  </div>
</div>

<script>
var countdown=0,timer=null;

function showErr(m){var e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';document.getElementById('okMsg').style.display='none'}
function showOk(m){var e=document.getElementById('okMsg');e.textContent=m;e.style.display='block';document.getElementById('errMsg').style.display='none'}

function sendCode(){
  if(countdown>0)return;
  var phone=document.getElementById('phone').value.trim();
  if(!/^1\d{10}$/.test(phone)){showErr('请输入正确的手机号');return}
  var btn=document.getElementById('btnSend');
  btn.disabled=true;btn.textContent='发送中...';
  fetch('/api/auth/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone})})
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.success){showOk(d.message);countdown=60;btn.textContent=countdown+'s';timer=setInterval(function(){countdown--;if(countdown<=0){clearInterval(timer);btn.textContent='发送验证码';btn.disabled=false}else{btn.textContent=countdown+'s'}},1000)}
      else{showErr(d.error);btn.disabled=false;btn.textContent='发送验证码'}
    }).catch(function(e){showErr('网络错误');btn.disabled=false;btn.textContent='发送验证码'});
}

function doLogin(){
  if(!document.getElementById('agree').checked){showErr('请先阅读并同意用户协议和隐私政策');return}
  var phone=document.getElementById('phone').value.trim();
  var code=document.getElementById('code').value.trim();
  if(!phone){showErr('请输入手机号');return}
  if(!code){showErr('请输入验证码');return}
  var btn=document.getElementById('btnLogin');
  btn.disabled=true;btn.textContent='登录中...';
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone,code:code})})
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.token){
        localStorage.setItem('tutor_token',d.token);
        localStorage.setItem('tutor_user',JSON.stringify(d.user));
        window.location.href='/';
      }else{showErr(d.error||'登录失败');btn.disabled=false;btn.textContent='登录 / 注册'}
    }).catch(function(e){showErr('网络错误，请重试');btn.disabled=false;btn.textContent='登录 / 注册'});
}

// Auto-redirect if already logged in
(function(){
  var token=localStorage.getItem('tutor_token');
  if(token){
    fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}})
      .then(function(r){return r.json()})
      .then(function(d){if(d.user)window.location.href='/'}).catch(function(){});
  }
})();
</script>
</body>
</html>
